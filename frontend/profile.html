<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Profile | Internship Portal</title>
    <link rel="stylesheet" href="./css/profile.css" />
  </head>

  <body>
    <nav class="navbar">
      <div class="logo">
        <h2>SIP</h2>
        <p>Student Internship Portal</p>
      </div>

      <ul class="nav-links">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="upload_resume.html">Resume</a></li>
        <li><a href="assigned_tasks.html">Tasks</a></li>
        <li><a href="daily_progress.html">Progress</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="#" id="logoutBtn">Logout</a></li>
      </ul>
    </nav>

    <section class="profile-section">
      <div class="profile-card">
        <div class="profile-header">
          <div class="profile-icon">🎓</div>

          <h2>Student Profile</h2>

          <p>Your registered information</p>
        </div>

        <div class="profile-details">
          <div class="detail">
            <span>Full Name</span>
            <strong id="name"></strong>
          </div>

          <div class="detail">
            <span>Email Address</span>
            <strong id="email"></strong>
          </div>

          <div class="detail">
            <span>Phone Number</span>
            <strong id="phone"></strong>
          </div>

          <div class="detail">
            <span>College Name</span>
            <strong id="college"></strong>
          </div>

          <div class="detail">
            <span>Course</span>
            <strong id="course"></strong>
          </div>

          <div class="detail">
            <span>Resume Status</span>
            <strong id="resumeStatus"></strong>
          </div>
        </div>

        <a href="edit_profile.html"> <button>Edit Profile</button> </a>
      </div>
    </section>

    <footer>
      <p>© 2026 Student Internship Portal | Designed for Students</p>
    </footer>

    <!-- Axios CDN -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script src="./js/profile.js"></script>
    <script type="module" src="./js/profile.js"></script>
  </body>
</html>
