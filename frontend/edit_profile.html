<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Profile | Student Internship Portal</title>

    <link rel="stylesheet" href="../css/edit_profile.css">

</head>

<body>

    <header>

        <nav class="navbar">

            <div class="logo">
                <h2>🎓 SIP</h2>
                <p>Student Internship Portal</p>
            </div>

            <ul class="nav-links">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="upload_resume.html">Resume</a></li>
                <li><a href="assigned_tasks.html">Tasks</a></li>
                <li><a href="daily_progress.html">Progress</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="#" id="logoutBtn">Logout</a></li>
            </ul>

        </nav>

    </header>

    <section class="edit-profile-section">

        <div class="edit-profile-card">

            <h1>Edit Profile</h1>

            <p>
                Update your profile information.
            </p>

            <form id="editProfileForm">

                <label for="name">Full Name</label>
                <input
                    type="text"
                    id="name"
                    required>

                <label for="email">Email Address <span class="notUpdate">(Currently Not Possible To Update)</span></label>
                <input
                    type="email"
                    id="email"
                    readonly>

                <label for="phone">Phone Number</label>
                <input
                    type="tel"
                    id="phone"
                    required>

                <label for="college">College Name</label>
                <input
                    type="text"
                    id="college"
                    required>

                <label for="course">Course</label>
                <input
                    type="text"
                    id="course"
                    required>

                <button type="submit">
                    Update Profile
                </button>

            </form>

        </div>

    </section>

    <footer>

        <p>
            © 2026 Student Internship Portal | All Rights Reserved
        </p>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script type="module" src="../js/edit_profile.js"></script>
    <script src="../js/edit_profile.js"></script>

</body>

</html>
