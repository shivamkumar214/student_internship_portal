<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Upload Resume | Student Internship Portal</title>

    <link rel="stylesheet" href="../css/upload_resume.css">

</head>

<body>

    <header>

        <nav class="navbar">

            <div class="logo">
                <h2>🎓 SIP</h2>
                <p>Student Internship Portal</p>
            </div>

            <ul class="nav-links">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="upload_resume.html">Resume</a></li>
                <li><a href="assigned_tasks.html">Tasks</a></li>
                <li><a href="daily_progress.html">Progress</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="#" id="logoutBtn">Logout</a></li>
            </ul>

        </nav>

    </header>

    <section class="resume-section">

        <div class="resume-card">

            <h1>Upload Resume</h1>

            <p>
                Upload your latest resume for internship verification.
            </p>

            <!-- <form id="resumeForm" enctype="multipart/form-data"> -->
            <form id="resumeForm" enctype="multipart/form-data">
                <label for="resume">
                    Select Resume
                </label>

                <input
                    type="file"
                    id="resume"
                    name="resume"
                    accept=".pdf,.doc,.docx"
                    required>

                <button type="submit">
                    Upload Resume
                </button>

            </form>

            <div class="upload-status">

                <h3>Resume Status</h3>

                <p id="statusText">
                    No Resume Uploaded
                </p>

                <br>

                <button id="viewResumeBtn" type="button">
                    View Resume
                </button>

                <button id="deleteResumeBtn" type="button">
                    Delete Resume
                </button>

            </div>

        </div>

    </section>

    <footer>

        <p>
            © 2026 Student Internship Portal | All Rights Reserved
        </p>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../js/upload_resume.js"></script>
    <!-- <script type="module" src="../js/upload_resume.js"></script> -->
    <script type="module" src="../js/upload_resume.js"></script>
    <!-- <script type="module" src="../js/upload_resume.js"></script> -->
</body>

</html>
