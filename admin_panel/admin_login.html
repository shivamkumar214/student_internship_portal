</p>

</div>

<form id="loginForm">

<label>Email Address</label>

<input
type="email"
id="email"
placeholder="Enter Email Address"
required>

<input
type="password"
id="password"
placeholder="Enter Password"
required>

<button type="submit">
Login
</button>

<p id="message"></p>

</form>

<a href="login.html">
← Back to Student Login
</a>

</p>
